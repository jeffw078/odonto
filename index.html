<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Atendimento</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', Arial, sans-serif;
        background: #F7F3F2;
    }

    .container {
        width: 100%;
        height: 100vh;
        display: flex;
        flex-direction: column;
        padding: 10px;
        box-sizing: border-box;
    }

    .logo {
        text-align: center;
        padding: 10px 0;
    }

    .logo img {
        max-height: 80px;
        width: auto;
    }

    .content {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        text-align: center;
        padding: 10px;
    }

    h1 {
        color: #4E404F;
        margin-bottom: 20px;
        font-size: 5vw;
    }

    p {
        color: #666;
        font-size: 3.5vw;
    }

    button {
        width: 100%;
        padding: 18px;
        margin: 10px 0;
        font-size: 4vw;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        background: #81555A;
        color: white;
    }

    button:active {
        transform: scale(0.98);
    }

    .secondary {
        background: #ddd;
        color: #333;
    }

    .numero {
        font-size: 6vw;
        font-weight: bold;
        color: #4E404F;
        margin: 15px 0;
    }

    .qr {
        width: 40vw;
        max-width: 200px;
        margin-top: 10px;
    }

    .footer {
        border-top: 1px solid #eee;
        padding: 10px;
        font-size: 3vw;
        text-align: center;
        color: #666;
    }

    /* Tablet ajustes */
    @media (min-width: 768px) {
        h1 { font-size: 28px; }
        p { font-size: 18px; }
        button { font-size: 20px; }
        .numero { font-size: 32px; }
        .footer { font-size: 14px; }
    }

</style>
</head>

<body>

<div class="container">

    <div class="logo">
        <img src="./logo.png">
    </div>

    <div class="content" id="app"></div>

    <div class="footer">
        <b style="color:#81555A;">Serviços Odontológicos</b><br>
        Limpeza • Clareamento • Ortodontia • Implantes
    </div>

</div>

<script>
let timeout;

// Tela inicial
function telaInicial() {
    clearTimeout(timeout);

    app.innerHTML = `
        <h1>Bem-vindo à Clínica</h1>
        <p>Toque abaixo para iniciar seu atendimento</p>
        <button onclick="selecionarProfissional()">INICIAR ATENDIMENTO</button>
    `;
}

// Seleção
function selecionarProfissional() {
    clearTimeout(timeout);

    app.innerHTML = `
        <h1>Selecione o profissional</h1>

        <button onclick="menuClaudia()">Claudia Secco</button>
        <button onclick="mostrarWhats('Amanda Lopes','(47) 99999-1111','5547999991111')">Amanda Lopes</button>
        <button onclick="mostrarWhats('Rodrigo Rodrigue de Jesus','(47) 99999-2222','5547999992222')">Rodrigo Rodrigue de Jesus</button>

        <button class="secondary" onclick="telaInicial()">VOLTAR</button>
    `;
}

// Claudia
function menuClaudia() {
    clearTimeout(timeout);

    app.innerHTML = `
        <h1>Claudia Secco</h1>

        <p><b>Serviços:</b><br>
        Limpeza • Clareamento • Ortodontia • Implantes</p>

        <button onclick="abrirAgendamento()">AGENDAR CONSULTA</button>
        <button onclick="aguardando()">JÁ TENHO CONSULTA</button>

        <button class="secondary" onclick="telaInicial()">VOLTAR</button>
    `;
}

// Redirecionamento
function abrirAgendamento() {
    app.innerHTML = `
        <h1>Redirecionando...</h1>
        <p>Aguarde um instante</p>
    `;

    setTimeout(() => {
        window.location.href = "https://app.simplesdental.com/simples/agendamento/claudiasecco";
    }, 1500);
}

// Aguardando
function aguardando() {
    clearTimeout(timeout);

    app.innerHTML = `
        <h1>Fique à vontade</h1>
        <p>Aguarde seu atendimento 😊</p>
    `;

    timeout = setTimeout(telaInicial, 15000);
}

// WhatsApp
function mostrarWhats(nome, numeroFormatado, numeroLink) {
    clearTimeout(timeout);

    app.innerHTML = `
        <h1>${nome}</h1>

        <p>Entre em contato pelo WhatsApp</p>

        <div class="numero">${numeroFormatado}</div>

        <img class="qr"
        src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://wa.me/${numeroLink}">

        <button class="secondary" onclick="telaInicial()">VOLTAR</button>
    `;

    timeout = setTimeout(telaInicial, 60000);
}

// start
telaInicial();
</script>

</body>
</html>
